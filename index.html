<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧园区 3D 展示</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: #0a0e27;
        color: #e0e6f0;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .app-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        position: relative;
      }

      .header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 56px;
        background: linear-gradient(180deg, rgba(10, 14, 39, 0.95) 0%, rgba(10, 14, 39, 0.6) 100%);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        border-bottom: 1px solid rgba(59, 130, 246, 0.2);
      }

      .header h1 {
        font-size: 20px;
        font-weight: 600;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 4px;
      }

      .main-content {
        flex: 1;
        position: relative;
      }

      .canvas-container {
        width: 100%;
        height: 100%;
      }

      /* 左侧楼栋列表 */
      .building-list {
        position: absolute;
        top: 72px;
        left: 16px;
        width: 220px;
        background: rgba(15, 23, 42, 0.88);
        backdrop-filter: blur(16px);
        border-radius: 12px;
        border: 1px solid rgba(59, 130, 246, 0.25);
        z-index: 90;
        overflow: hidden;
      }

      .building-list-header {
        padding: 14px 16px 10px;
        font-size: 14px;
        font-weight: 600;
        color: #94a3b8;
        border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        letter-spacing: 1px;
      }

      .building-list-items {
        padding: 8px;
        max-height: calc(100vh - 220px);
        overflow-y: auto;
      }

      .building-list-items::-webkit-scrollbar {
        width: 4px;
      }

      .building-list-items::-webkit-scrollbar-thumb {
        background: rgba(59, 130, 246, 0.3);
        border-radius: 2px;
      }

      .building-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-bottom: 4px;
      }

      .building-item:hover {
        background: rgba(59, 130, 246, 0.15);
      }

      .building-item.active {
        background: rgba(59, 130, 246, 0.25);
        border: 1px solid rgba(96, 165, 250, 0.4);
      }

      .building-item-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .building-item-name {
        font-size: 13px;
        color: #cbd5e1;
      }

      .building-item-type {
        font-size: 11px;
        color: #64748b;
        margin-left: auto;
      }

      /* 右上角视角切换 */
      .view-switcher {
        position: absolute;
        top: 72px;
        right: 16px;
        display: flex;
        gap: 8px;
        z-index: 90;
      }

      .view-btn {
        padding: 8px 16px;
        background: rgba(15, 23, 42, 0.88);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(59, 130, 246, 0.25);
        border-radius: 8px;
        color: #94a3b8;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
      }

      .view-btn:hover {
        background: rgba(59, 130, 246, 0.2);
        color: #e0e6f0;
      }

      .view-btn.active {
        background: rgba(59, 130, 246, 0.3);
        border-color: rgba(96, 165, 250, 0.5);
        color: #60a5fa;
      }

      /* 建筑信息面板 */
      .info-panel {
        position: absolute;
        top: 72px;
        right: 16px;
        width: 300px;
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(16px);
        border-radius: 12px;
        border: 1px solid rgba(59, 130, 246, 0.3);
        z-index: 95;
        overflow: hidden;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .info-panel-header {
        padding: 16px 18px;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.15) 100%);
        border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .info-panel-title {
        font-size: 16px;
        font-weight: 600;
        color: #e0e6f0;
      }

      .info-panel-close {
        background: none;
        border: none;
        color: #64748b;
        font-size: 20px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
        transition: color 0.2s;
      }

      .info-panel-close:hover {
        color: #e0e6f0;
      }

      .info-panel-body {
        padding: 16px 18px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(59, 130, 246, 0.08);
      }

      .info-row:last-child {
        border-bottom: none;
      }

      .info-label {
        font-size: 13px;
        color: #64748b;
      }

      .info-value {
        font-size: 14px;
        font-weight: 600;
        color: #e0e6f0;
      }

      .info-value.rate {
        color: #34d399;
      }

      .info-enterprises {
        margin-top: 12px;
      }

      .info-enterprises-title {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 8px;
      }

      .enterprise-tag {
        display: inline-block;
        padding: 4px 10px;
        background: rgba(59, 130, 246, 0.15);
        border-radius: 4px;
        font-size: 12px;
        color: #94a3b8;
        margin: 0 6px 6px 0;
      }

      /* 底部数据面板 */
      .bottom-panel {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        z-index: 90;
      }

      .stat-card {
        background: rgba(15, 23, 42, 0.88);
        backdrop-filter: blur(16px);
        border-radius: 12px;
        border: 1px solid rgba(59, 130, 246, 0.2);
        padding: 16px 24px;
        min-width: 160px;
        text-align: center;
        transition: all 0.2s ease;
      }

      .stat-card:hover {
        border-color: rgba(59, 130, 246, 0.4);
        transform: translateY(-2px);
      }

      .stat-label {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }

      .stat-value {
        font-size: 22px;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .stat-value.green {
        background: linear-gradient(135deg, #34d399, #6ee7b7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .stat-value.orange {
        background: linear-gradient(135deg, #fb923c, #fbbf24);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .stat-unit {
        font-size: 12px;
        color: #64748b;
        margin-top: 2px;
      }

      /* 公告卡片 */
      .notice-card {
        background: rgba(15, 23, 42, 0.88);
        backdrop-filter: blur(16px);
        border-radius: 12px;
        border: 1px solid rgba(59, 130, 246, 0.2);
        padding: 16px 24px;
        min-width: 280px;
        max-width: 320px;
      }

      .notice-title {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }

      .notice-content {
        font-size: 13px;
        color: #94a3b8;
        line-height: 1.6;
      }

      /* 楼层布局面板 */
      .floor-panel {
        position: absolute;
        top: 72px;
        right: 16px;
        width: 320px;
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(16px);
        border-radius: 12px;
        border: 1px solid rgba(59, 130, 246, 0.3);
        z-index: 95;
        overflow: hidden;
        animation: slideIn 0.3s ease;
      }

      .floor-panel-header {
        padding: 16px 18px;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.15) 100%);
        border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .floor-panel-body {
        padding: 12px 18px;
      }

      .floor-row {
        display: flex;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid rgba(59, 130, 246, 0.06);
      }

      .floor-label {
        font-size: 13px;
        color: #64748b;
        width: 50px;
      }

      .floor-bar-bg {
        flex: 1;
        height: 20px;
        background: rgba(59, 130, 246, 0.08);
        border-radius: 4px;
        overflow: hidden;
        margin: 0 12px;
      }

      .floor-bar {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
      }

      .floor-info {
        font-size: 12px;
        color: #94a3b8;
        width: 60px;
        text-align: right;
      }

      .back-btn {
        padding: 8px 16px;
        background: rgba(59, 130, 246, 0.2);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 6px;
        color: #60a5fa;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        margin-top: 12px;
      }

      .back-btn:hover {
        background: rgba(59, 130, 246, 0.3);
      }

      /* Tooltip for 3D hover */
      .hover-tooltip {
        position: absolute;
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 8px;
        padding: 8px 14px;
        pointer-events: none;
        z-index: 200;
        transform: translate(-50%, -100%);
        margin-top: -12px;
      }

      .hover-tooltip-name {
        font-size: 13px;
        font-weight: 600;
        color: #e0e6f0;
      }

      .hover-tooltip-type {
        font-size: 11px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
